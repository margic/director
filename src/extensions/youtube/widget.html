<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #111317; color: white; font-family: sans-serif; margin: 0; padding: 10px; overflow: hidden; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .title { font-size: 10px; font-weight: bold; color: #888; letter-spacing: 1px; }
        .stats { display: flex; gap: 15px; }
        .stat-item { display: flex; flex-direction: column; }
        .value { font-size: 16px; font-weight: bold; color: #00A3E0; font-family: monospace; }
        .label { font-size: 8px; color: #666; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="header">
        <span class="title">YOUTUBE COMMS</span>
        <div id="status-dot" style="width: 6px; height: 6px; border-radius: 50%; background: #333;"></div>
    </div>
    <div class="stats">
        <div class="stat-item">
            <span class="value" id="count-rx">0</span>
            <span class="label">Received</span>
        </div>
        <div class="stat-item">
            <span class="value" id="count-tx">0</span>
            <span class="label">Sent</span>
        </div>
    </div>

    <script>
        // Use the exposed electron API to listen for events
        if (window.electronAPI) {
            window.electronAPI.extensions.onExtensionEvent((data) => {
                if (data.extensionId === 'director-youtube') {
                    if (data.eventName === 'youtube.stats') {
                        document.getElementById('count-rx').innerText = data.payload.messagesReceived;
                        document.getElementById('count-tx').innerText = data.payload.messagesSent;
                    }
                    if (data.eventName === 'youtube.status') {
                         const dot = document.getElementById('status-dot');
                         dot.style.background = data.payload.monitoring ? '#EF3340' : '#333';
                         dot.style.boxShadow = data.payload.monitoring ? '0 0 5px #EF3340' : 'none';
                    }
                }
            });
            
            // Initial probe
            window.electronAPI.extensions.getStatus().then(statuses => {
                 if (statuses['director-youtube']?.active) {
                     // Request current stats? Or just wait for next heartbeat
                 }
            });
        }
    </script>
</body>
